services:
  talenta-bot:
    # On VPS: `docker compose pull` gets prebuilt image from GHCR.
    # On dev: `docker compose build` builds locally and tags with this name.
    image: ghcr.io/bimapangestu28/talenta-automation:latest
    build: .
    container_name: talenta-bot
    restart: unless-stopped
    env_file: .env
    environment:
      TZ: Asia/Jakarta
    volumes:
      - ./state:/app/state
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
